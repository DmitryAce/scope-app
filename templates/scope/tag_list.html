{% extends 'base.html' %}

{% block content %}
<div class="tags-view">
    <div class="tags-header" style="margin-bottom: 24px;">
        <button class="btn btn-primary" onclick="openTagModal()">
            <i class="ri-add-line"></i>
            Новый тег
        </button>
    </div>
    
    {% if tag_list %}
    <div class="tags-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px;">
        {% for tag in tag_list %}
        <div class="tag-card" data-id="{{ tag.id }}" style="background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 16px; display: flex; align-items: center; justify-content: space-between; transition: all 0.2s ease; border-left: 3px solid {{ tag.color }};">
            <div style="display: flex; align-items: center; gap: 12px;">
                <span class="tag-dot" style="background: {{ tag.color }}; width: 12px; height: 12px;"></span>
                <span style="font-weight: 500;">{{ tag.name }}</span>
            </div>
            <div style="display: flex; align-items: center; gap: 8px;">
                <span style="color: var(--text-muted); font-size: 13px;">{{ tag.tasks.count }} {{ tag.tasks.count|pluralize:"задача,задачи,задач" }}</span>
                <button class="btn-icon" onclick="deleteTag({{ tag.id }})" style="color: var(--text-muted);" title="Удалить тег">
                    <i class="ri-close-line"></i>
                </button>
            </div>
        </div>
        {% endfor %}
    </div>
    {% else %}
    <div class="empty-state">
        <div class="empty-state-icon">
            <i class="ri-price-tag-3-line"></i>
        </div>
        <h3 class="empty-state-title">Нет тегов</h3>
        <p class="empty-state-text">Создайте теги для лучшей организации задач</p>
        <button class="btn btn-primary" onclick="openTagModal()">
            <i class="ri-add-line"></i>
            Создать тег
        </button>
    </div>
    {% endif %}
</div>
{% endblock %}
