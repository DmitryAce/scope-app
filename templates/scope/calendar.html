{% extends 'base.html' %}

{% block content %}
<div class="kanban-calendar" id="kanbanCalendar">
    <div class="kanban-toolbar">
        <div class="kanban-nav">
            <button class="btn-icon" onclick="kanbanCalendar.prevMonth()" title="Предыдущий месяц">
                <i class="ri-arrow-left-s-line"></i>
            </button>
            <h2 class="kanban-month-title" id="kanbanTitle">Загрузка...</h2>
            <button class="btn-icon" onclick="kanbanCalendar.nextMonth()" title="Следующий месяц">
                <i class="ri-arrow-right-s-line"></i>
            </button>
        </div>
        <div class="kanban-actions">
            <button class="btn btn-ghost btn-sm" onclick="kanbanCalendar.goToToday()">
                <i class="ri-focus-3-line"></i> Сегодня
            </button>
            <button class="btn btn-ghost btn-sm" onclick="kanbanCalendar.expandAll()">
                <i class="ri-expand-up-down-line"></i> Раскрыть все
            </button>
            <button class="btn btn-ghost btn-sm" onclick="kanbanCalendar.collapseAll()">
                <i class="ri-collapse-diagonal-line"></i> Свернуть
            </button>
        </div>
    </div>

    <div class="kanban-weeks" id="kanbanWeeks">
        <div class="kanban-loading">
            <i class="ri-loader-4-line spin"></i>
            <p>Загрузка задач...</p>
        </div>
    </div>
</div>
<script>
class KanbanCalendar {
    constructor() {
        this.currentDate = new Date();
        this.events = [];
        this.expandedWeeks = new Set();
        this.draggedTask = null;
        this.init();
    }

    formatDateStr(y, m, d) {
        return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    }

    getTodayStr() {
        const t = new Date();
        return this.formatDateStr(t.getFullYear(), t.getMonth(), t.getDate());
    }

    async init() {
        await this.loadEvents();
        this.render();
    }

    async loadEvents() {
        const y = this.currentDate.getFullYear();
        const m = this.currentDate.getMonth();
        const firstDay = new Date(y, m, 1);
        let startDay = firstDay.getDay();
        startDay = startDay === 0 ? 6 : startDay - 1;
        const calStart = new Date(y, m, 1 - startDay);
        const lastDay = new Date(y, m + 1, 0);
        const totalDays = startDay + lastDay.getDate();
        const rows = Math.ceil(totalDays / 7);
        const calEnd = new Date(calStart);
        calEnd.setDate(calEnd.getDate() + rows * 7 - 1);

        const start = this.formatDateStr(calStart.getFullYear(), calStart.getMonth(), calStart.getDate());
        const end = this.formatDateStr(calEnd.getFullYear(), calEnd.getMonth(), calEnd.getDate());

        try {
            const res = await fetch(`/api/kanban-events/?start=${start}&end=${end}`);
            this.events = await res.json();
        } catch (e) {
            this.events = [];
        }
    }

    getWeeks() {
        const y = this.currentDate.getFullYear();
        const m = this.currentDate.getMonth();
        const firstDay = new Date(y, m, 1);
        const lastDay = new Date(y, m + 1, 0);

        let startDay = firstDay.getDay();
        startDay = startDay === 0 ? 6 : startDay - 1;

        const calStart = new Date(y, m, 1 - startDay);
        const totalDays = startDay + lastDay.getDate();
        const rows = Math.ceil(totalDays / 7);

        const weeks = [];
        const cursor = new Date(calStart);

        for (let w = 0; w < rows; w++) {
            const days = [];
            for (let d = 0; d < 7; d++) {
                days.push({
                    date: new Date(cursor),
                    dateStr: this.formatDateStr(cursor.getFullYear(), cursor.getMonth(), cursor.getDate()),
                    isCurrentMonth: cursor.getMonth() === m,
                    isToday: this.formatDateStr(cursor.getFullYear(), cursor.getMonth(), cursor.getDate()) === this.getTodayStr(),
                });
                cursor.setDate(cursor.getDate() + 1);
            }
            weeks.push({
                index: w,
                days,
                startStr: days[0].dateStr,
                endStr: days[6].dateStr,
            });
        }
        return weeks;
    }

    render() {
        const months = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
        const y = this.currentDate.getFullYear();
        const m = this.currentDate.getMonth();

        document.getElementById('kanbanTitle').textContent = `${months[m]} ${y}`;

        const weeks = this.getWeeks();
        const todayStr = this.getTodayStr();
        const container = document.getElementById('kanbanWeeks');

        // Auto-expand week containing today
        const todayWeekIdx = weeks.findIndex(w => w.days.some(d => d.dateStr === todayStr));
        if (this.expandedWeeks.size === 0 && todayWeekIdx >= 0) {
            this.expandedWeeks.add(todayWeekIdx);
        }

        const dayNames = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
        const monthNamesShort = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];

        let html = '';

        weeks.forEach((week, wIdx) => {
            const isExpanded = this.expandedWeeks.has(wIdx);
            const weekEvents = this.events.filter(e =>
                e.start >= week.startStr && e.start <= week.endStr
            );
            const activeEvents = weekEvents.filter(e => !e.completed);
            const completedCount = weekEvents.filter(e => e.completed).length;

            const hasToday = week.days.some(d => d.isToday);

            const startD = week.days[0].date;
            const endD = week.days[6].date;
            const startLabel = `${startD.getDate()} ${monthNamesShort[startD.getMonth()]}`;
            const endLabel = `${endD.getDate()} ${monthNamesShort[endD.getMonth()]}`;

            html += `
            <div class="kanban-week ${isExpanded ? 'expanded' : ''} ${hasToday ? 'has-today' : ''}">
                <div class="kanban-week-header" onclick="kanbanCalendar.toggleWeek(${wIdx})">
                    <div class="kanban-week-left">
                        <i class="ri-arrow-right-s-line kanban-chevron"></i>
                        <span class="kanban-week-label">${startLabel} — ${endLabel}</span>
                        ${hasToday ? '<span class="kanban-today-badge">сейчас</span>' : ''}
                    </div>
                    <div class="kanban-week-right">
                        ${activeEvents.length > 0 ? `<span class="kanban-week-count">${activeEvents.length} ${this.pluralize(activeEvents.length, 'задача', 'задачи', 'задач')}</span>` : ''}
                        ${completedCount > 0 ? `<span class="kanban-week-done"><i class="ri-check-line"></i> ${completedCount}</span>` : ''}
                    </div>
                </div>
                <div class="kanban-week-body" style="${isExpanded ? '' : 'display:none'}">
                    <div class="kanban-days">`;

            week.days.forEach((day, dIdx) => {
                const dayEvents = this.events.filter(e => e.start === day.dateStr);
                const isPast = day.dateStr < todayStr && !day.isToday;

                html += `
                    <div class="kanban-day ${day.isToday ? 'today' : ''} ${!day.isCurrentMonth ? 'other-month' : ''} ${isPast ? 'past' : ''}"
                         data-date="${day.dateStr}"
                         ondragover="kanbanCalendar.onDragOver(event)"
                         ondragleave="kanbanCalendar.onDragLeave(event)"
                         ondrop="kanbanCalendar.onDrop(event, '${day.dateStr}')">
                        <div class="kanban-day-header">
                            <span class="kanban-day-name">${dayNames[dIdx]}</span>
                            <span class="kanban-day-num ${day.isToday ? 'today-num' : ''}">${day.date.getDate()}</span>
                        </div>
                        <div class="kanban-day-tasks">`;

                dayEvents.forEach(task => {
                    html += this.renderTask(task);
                });

                html += `
                        </div>
                        <button class="kanban-add-btn" onclick="openTaskModal({due_date: '${day.dateStr}'})" title="Добавить задачу">
                            <i class="ri-add-line"></i>
                        </button>
                    </div>`;
            });

            html += `
                    </div>
                </div>
            </div>`;
        });

        container.innerHTML = html;
    }

    renderTask(task) {
        const priorityColors = { low: 'var(--priority-low)', medium: 'var(--priority-medium)', high: 'var(--priority-high)', urgent: 'var(--priority-urgent)' };
        const color = priorityColors[task.priority_class] || 'var(--priority-medium)';

        return `
            <div class="kanban-task ${task.completed ? 'completed' : ''} ${task.overdue ? 'overdue' : ''}"
                 draggable="true"
                 data-task-id="${task.id}"
                 ondragstart="kanbanCalendar.onDragStart(event, ${task.id})"
                 ondragend="kanbanCalendar.onDragEnd(event)">
                <div class="kanban-task-priority" style="background:${color}"></div>
                <div class="kanban-task-body">
                    <a href="${task.url}" class="kanban-task-title">${this.escapeHtml(task.title)}</a>
                    <div class="kanban-task-meta">
                        ${task.time ? `<span><i class="ri-time-line"></i>${task.time}</span>` : ''}
                        ${task.project ? `<span style="color:${task.projectColor || 'var(--accent-secondary)'}">${this.escapeHtml(task.project)}</span>` : ''}
                    </div>
                </div>
                <button class="kanban-task-check" onclick="event.stopPropagation(); kanbanCalendar.toggleTaskFromKanban(${task.id})" title="${task.completed ? 'Вернуть' : 'Завершить'}">
                    <i class="${task.completed ? 'ri-checkbox-circle-fill' : 'ri-checkbox-blank-circle-line'}"></i>
                </button>
            </div>`;
    }

    // Drag and Drop
    onDragStart(e, taskId) {
        this.draggedTask = taskId;
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', taskId);
        e.target.classList.add('dragging');
    }

    onDragEnd(e) {
        e.target.classList.remove('dragging');
        document.querySelectorAll('.kanban-day.drag-over').forEach(d => d.classList.remove('drag-over'));
    }

    onDragOver(e) {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        const day = e.target.closest('.kanban-day');
        if (day) day.classList.add('drag-over');
    }

    onDragLeave(e) {
        const day = e.target.closest('.kanban-day');
        if (day && !day.contains(e.relatedTarget)) {
            day.classList.remove('drag-over');
        }
    }

    async onDrop(e, dateStr) {
        e.preventDefault();
        const day = e.target.closest('.kanban-day');
        if (day) day.classList.remove('drag-over');

        const taskId = this.draggedTask;
        if (!taskId) return;

        // Optimistic: move task card in DOM
        const taskEl = document.querySelector(`.kanban-task[data-task-id="${taskId}"]`);
        const targetTasks = day?.querySelector('.kanban-day-tasks');
        if (taskEl && targetTasks) {
            targetTasks.appendChild(taskEl);
            taskEl.style.animation = 'slideIn 0.3s ease';
        }

        try {
            const data = await apiFetch(`/tasks/${taskId}/update-date/`, {
                method: 'POST',
                body: `due_date=${dateStr}`,
            });
            if (data.success) {
                showToast('Задача перемещена');
                // Update events cache
                const evt = this.events.find(ev => ev.id === taskId);
                if (evt) evt.start = dateStr;
            } else {
                this.reload();
            }
        } catch (err) {
            showToast('Ошибка при перемещении', 'error');
            this.reload();
        }
    }

    async toggleTaskFromKanban(taskId) {
        try {
            const data = await apiFetch(`/tasks/${taskId}/toggle/`, { method: 'POST' });
            if (data.success) {
                const taskEl = document.querySelector(`.kanban-task[data-task-id="${taskId}"]`);
                if (taskEl) {
                    if (data.is_completed) {
                        taskEl.classList.add('completed');
                        taskEl.querySelector('.kanban-task-check i').className = 'ri-checkbox-circle-fill';
                        taskEl.style.transition = 'all 0.4s ease';
                        taskEl.style.opacity = '0.4';
                        showToast('Задача завершена! ✓');
                    } else {
                        taskEl.classList.remove('completed');
                        taskEl.querySelector('.kanban-task-check i').className = 'ri-checkbox-blank-circle-line';
                        taskEl.style.opacity = '1';
                        showToast('Задача возвращена', 'info');
                    }
                }
                const evt = this.events.find(ev => ev.id === taskId);
                if (evt) evt.completed = data.is_completed;
                updateSidebarCounts();
            }
        } catch (err) {
            showToast('Ошибка', 'error');
        }
    }

    toggleWeek(idx) {
        if (this.expandedWeeks.has(idx)) {
            this.expandedWeeks.delete(idx);
        } else {
            this.expandedWeeks.add(idx);
        }
        const weekEls = document.querySelectorAll('.kanban-week');
        const el = weekEls[idx];
        if (!el) return;

        const body = el.querySelector('.kanban-week-body');
        if (this.expandedWeeks.has(idx)) {
            el.classList.add('expanded');
            body.style.display = '';
            body.style.maxHeight = '0';
            body.style.overflow = 'hidden';
            body.style.transition = 'max-height 0.4s ease';
            requestAnimationFrame(() => { body.style.maxHeight = body.scrollHeight + 'px'; });
            setTimeout(() => { body.style.maxHeight = ''; body.style.overflow = ''; }, 400);
        } else {
            el.classList.remove('expanded');
            body.style.maxHeight = body.scrollHeight + 'px';
            body.style.overflow = 'hidden';
            body.style.transition = 'max-height 0.3s ease';
            requestAnimationFrame(() => { body.style.maxHeight = '0'; });
            setTimeout(() => { body.style.display = 'none'; body.style.overflow = ''; }, 300);
        }
    }

    expandAll() {
        const weekEls = document.querySelectorAll('.kanban-week');
        weekEls.forEach((el, idx) => {
            this.expandedWeeks.add(idx);
            el.classList.add('expanded');
            const body = el.querySelector('.kanban-week-body');
            body.style.display = '';
            body.style.maxHeight = '';
            body.style.overflow = '';
        });
    }

    collapseAll() {
        const weekEls = document.querySelectorAll('.kanban-week');
        weekEls.forEach((el, idx) => {
            this.expandedWeeks.delete(idx);
            el.classList.remove('expanded');
            const body = el.querySelector('.kanban-week-body');
            body.style.display = 'none';
        });
    }

    prevMonth() {
        this.currentDate.setMonth(this.currentDate.getMonth() - 1);
        this.expandedWeeks.clear();
        this.init();
    }

    nextMonth() {
        this.currentDate.setMonth(this.currentDate.getMonth() + 1);
        this.expandedWeeks.clear();
        this.init();
    }

    goToToday() {
        this.currentDate = new Date();
        this.expandedWeeks.clear();
        this.init();
    }

    async reload() {
        await this.loadEvents();
        this.render();
    }

    escapeHtml(text) {
        if (!text) return '';
        const d = document.createElement('div');
        d.textContent = text;
        return d.innerHTML;
    }

    pluralize(n, one, few, many) {
        const m10 = n % 10, m100 = n % 100;
        if (m100 >= 11 && m100 <= 19) return many;
        if (m10 === 1) return one;
        if (m10 >= 2 && m10 <= 4) return few;
        return many;
    }
}

window.kanbanCalendar = new KanbanCalendar();
</script>
{% endblock %}
